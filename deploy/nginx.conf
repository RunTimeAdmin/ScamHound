# ScamHound Nginx Configuration
# Place this file at: /etc/nginx/sites-available/app.scamhoundcrypto.com
# Then enable with: ln -s /etc/nginx/sites-available/app.scamhoundcrypto.com /etc/nginx/sites-enabled/
#
# NOTE: This VPS already has Nginx running for other sites.
# This configuration adds ScamHound as a new site alongside existing ones.
# Server IP: 76.13.101.39

# Rate limiting zone for API endpoints
# 5 requests per minute per IP for /api/scan
limit_req_zone $binary_remote_addr zone=api_scan:10m rate=5r/m;

# General API rate limiting (more lenient)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;

server {
    listen 80;
    server_name app.scamhoundcrypto.com;

    # Client body size limit
    client_max_body_size 1M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files with caching (7 days)
    location /static/ {
        alias /opt/scamhound/scamhound/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket support for /ws/ path
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API endpoints with rate limiting
    location /api/scan {
        limit_req zone=api_scan burst=3 nodelay;
        limit_req_status 429;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API endpoints
    location /api/ {
        limit_req zone=api_general burst=10 nodelay;
        limit_req_status 429;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
